spring:
  datasource:
    url: jdbc:mysql://localhost:3306/member_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT 설정 추가
jwt:
  secret: this-is-a-very-secret-key-for-jwt-token-example-123456
  access-token-expire: 1800000     # 30분
  refresh-token-expire: 1209600000 # 14일